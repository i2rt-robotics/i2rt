# Unified config — THE single source of truth for the whole YAM setup.
# This file lives in the repo and every tool auto-finds it (no flag, no env var,
# regardless of directory). Just edit the values below. `--config <path>` can point
# elsewhere for a one-off. Precedence: CLI flag > this file > built-in default.
#
#   robot/yam teleop            # auto-reads <repo>/config.yaml
#   workstation/yam-data record   # same
#
# Fill in at least: cameras.* serials and robot.host (workstation -> robot IP).

robot:
  host: 192.168.0.42           # robot server (portal) address, used by the workstation tools
  port: 11331
  channels: { left: can_follower_l, right: can_follower_r }   # wrapper followers

policy:
  host: 127.0.0.1            # websocket policy server (for the bridge)
  port: 8000

control:                     # overrides i2rt/serving/control_config (robot server)
  bilateral_kp: 0.0
  ramp_speed: 0.8            # one-time engage approach speed (rad/s)
  home_speed: 0.8            # gentle homing return (rad/s)
  # --- engage / release gate (drives teleop_state IDLE↔ENGAGED↔HOMING, i.e. episode start/stop) ---
  engage_thr: 0.4           # gate-joint displacement (rad) to ENGAGE (lift to start)
  release_thr: 0.3          # gate-joint displacement (rad) to RELEASE → HOMING → IDLE (lower to end)
  dwell: 0.5                # seconds the threshold must hold before the state flips (debounce)
  gate_joints: [1]          # leader joint(s) that drive the gate ([] = L2 over all arm joints)
  # follower_effort_limit: 30.0          # Nm; collision/overload soft-stop (omit = off)
  # follower_joint_limits: [[-3.0, 3.0], [-2.0, 2.0]]   # per-joint clamp [lo, hi]

cameras:                     # RealSense serials by role (run `yam-data cams` to list)
  agentview: "246322303794"              # D455
  wrist_left: "409122274199"             # D405
  wrist_right: "352122271652"            # D405

recorder:
  repo_id: jellyho/yam_pick
  root: ~/lerobot_data
  fps: 60
  min_free_gb: 1.0
  source: teleop             # teleop | dagger | eval
  format: lerobot            # lerobot (LeRobotDataset) | abcdl (abcdl MP4+binary cache; needs the `abcdl` pkg)
  # abcdl_size: 224          # square px cameras are resized to for the abcdl format
  # --- per-frame RL signals (stored as dataset features; preserved across resume) ---
  rl_features: false         # add per-frame success / reward / mc_return from the episode outcome
  reward_mode: sparse        # sparse (0/+1 at success) | step (-1/step, 0 at success)
  discount_factor: 0.99      # γ for the Monte-Carlo return-to-go (mc_return)
  review_before_save: false  # auto-save every engage→idle episode (no Keep/Delete hold)
  auto_arm: true             # arm collection on Start; records on the next teleop engage
  # --- saving speed (video encoding) ---
  # The writer is single-threaded per dataset, but the ENCODER can go faster/parallel:
  vcodec: auto               # auto = GPU h264_nvenc here (fastest) | h264 (CPU, reliable) | libsvtav1 (slow AV1)
  encoder_threads: 0         # threads per encode (0 = LeRobot default)
  batch_encoding_size: 1     # 1 = encode each episode to video immediately (recommended w/ GPU).
                             # >1 batches/parallelizes encoding but keeps episodes as PNGs until the
                             # batch fills; the writer flushes leftovers on close so none are lost.
  # async PNG writer — the slow pre-encode step; parallelize it (LeRobot advises ~4 threads/camera):
  image_writer_threads: 12   # 0 = synchronous (single-threaded, slow); 12 = 4 x 3 cameras
  image_writer_processes: 0  # >0 = also use subprocesses if threads alone aren't enough
  # use_videos: true         # false = store raw frames (no encode; fastest save, larger on disk)
  buttons:                   # leader handle button -> episode outcome ("<side>.<index>", upper=0, lower=1)
    left.1: success          # left lower button  -> success
    right.1: fail            # right lower button -> fail
    left.0: discard          # left upper button  -> discard (force-home without saving)
    right.0: discard         # right upper button -> discard

tasks:                       # quick-switch language instructions in the recorder GUI
  - "pick up the cube"
  - "stack the blocks"
